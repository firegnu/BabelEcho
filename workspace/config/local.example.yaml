llm:
  provider: openai_compatible
  base_url: "https://api.deepseek.com"
  model: "deepseek-v4-pro"
  api_key_file: "workspace/config/deepseek.env"
  temperature: 0.3
  max_tokens: 4096
  extra_body:
    thinking:
      type: disabled

adapt:
  mode: chunked
  # Default: faithful_spoken keeps the Chinese spoken script close to the
  # source transcript while still cleaning subtitle/podcast transcript noise.
  # Use polished_spoken only when you explicitly want a looser, more natural
  # Chinese podcast-style rewrite.
  style: faithful_spoken
  chunk_max_segments: 20
  chunk_max_chars: 8000

tts:
  provider: local_cli
  command: "tts-wrapper"
  voice: "sft_builtin_4role"
  cosyvoice_repo: "/path/to/CosyVoice"
  speed: 1.0
  output_format: "wav"

# MVP-1 TTS uses a fixed four-role profile with hybrid local rendering:
# - 0/1 distinct speaker without an explicit gender marker: female_a.
# - 1 distinct speaker labeled with "male" or "男": male_a.
# - 1 distinct speaker labeled with "female" or "女": female_a.
# - 2+ distinct speakers: stable first-appearance mapping.
# Rendering backends:
# female_a=CosyVoice-300M-SFT/中文女
# male_a=CosyVoice2-0.5B/cross_lingual/speed=1.1
#   Uses ignored local calm prompt asset
#   workspace/config/tts-assets/male_a_cosyvoice2_calm_prompt.wav when present,
#   otherwise falls back to CosyVoice asset/cross_lingual_prompt.wav.
#   Applies male_a-only text smoothing before CosyVoice2 synthesis.
# female_b=CosyVoice-300M-SFT/英文女
# male_b=CosyVoice-300M-SFT/英文男
# Later fixed-role expansion should prefer a fine-tuned 300M SFT model with
# multiple Chinese male/female speakers, then update these role bindings after
# listening validation.
# If COSYVOICE_REPO is not available in the wrapper environment, set:
# cosyvoice_repo: "/home/th5090d/Develop/ai_tools/CosyVoice"

# Optional. Copy workspace/config/overrides.example.yaml to an ignored
# workspace/config/overrides.yaml, then enable this path.
# overrides:
#   path: "workspace/config/overrides.yaml"

# Optional. When enabled, BabelEcho calls the configured LLM once per episode
# before TTS to infer speaker gender direction, then writes an editable
# run-local mapping at workspace/runs/<run-id>/script/speaker-voices.json.
# Low confidence does not block the run; unknown speakers still get a concrete
# fallback voice_role.
# speaker_voices:
#   mode: infer_once
#   # Optional manual override for scripts with no speaker labels, such as many
#   # YouTube caption runs. Does not override named speaker mappings.
#   # default_voice_role: "male_a"
#
# Optional. Explicitly apply a private confirmed-alias voice-role map before TTS.
# This is opt-in only: default runs do not read private speaker alias maps.
# speaker_voices:
#   mode: apply_voice_role_map
#   voice_role_map: "workspace/runs/speaker-voice-role-map.json"
#   # Optional. Defaults to false so existing manual or inferred mappings are reused.
#   # overwrite: false

publish:
  base_url: "https://example.com/babelecho"
