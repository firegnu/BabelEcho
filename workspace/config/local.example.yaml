llm:
  provider: openai_compatible
  base_url: "https://api.deepseek.com"
  model: "deepseek-v4-pro"
  api_key_file: "workspace/config/deepseek.env"
  temperature: 0.3
  max_tokens: 4096
  extra_body:
    thinking:
      type: disabled

tts:
  provider: local_cli
  command: "tts-wrapper"
  voice: "default-zh"
  mode: "cross_lingual"
  prompt_wav: "/path/to/CosyVoice/asset/cross_lingual_prompt.wav"
  speed: 1.0
  output_format: "wav"

# MVP-1 TTS selection is automatic:
# - 0/1 distinct speaker without an explicit female marker: use the default-zh cross_lingual voice above.
# - 1 distinct speaker labeled with "female" or "女": switch to voice=sft_builtin_4role and role female_a.
# - 2+ distinct speakers: synthesize switches to voice=sft_builtin_4role.
# The SFT profile maps speakers by first appearance to:
# female_a=中文女, male_a=中文男, female_b=英文女, male_b=英文男.
# If COSYVOICE_REPO is not available in the wrapper environment, set:
# cosyvoice_repo: "/home/th5090d/Develop/ai_tools/CosyVoice"

# Optional. Copy workspace/config/overrides.example.yaml to an ignored
# workspace/config/overrides.yaml, then enable this path.
# overrides:
#   path: "workspace/config/overrides.yaml"

publish:
  base_url: "https://example.com/babelecho"
