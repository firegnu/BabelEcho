llm:
  provider: openai_compatible
  base_url: "https://api.deepseek.com"
  model: "deepseek-v4-pro"
  api_key_env: "DEEPSEEK_API_KEY"
  temperature: 0.3
  max_tokens: 4096
  extra_body:
    thinking:
      type: disabled

tts:
  provider: local_cli
  command: "tts-wrapper"
  voice: "default-zh"
  output_format: "wav"

publish:
  base_url: "https://example.com/babelecho"
